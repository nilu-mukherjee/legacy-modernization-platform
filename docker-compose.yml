# =============================================================================
# CodeLens AI — Docker Compose Configuration
# =============================================================================
# Usage:
#   docker compose up -d              # Start all services
#   docker compose up -d postgres redis  # Start only DB + Redis
#   docker compose logs -f            # Tail logs
#   docker compose down               # Stop all services
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database (with pgvector extension)
  # ---------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: codelens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codelens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codelens}
      POSTGRES_DB: ${POSTGRES_DB:-codelens}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codelens}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Redis (Job Queue + Cache)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: codelens-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # FastAPI Backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codelens-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://codelens:codelens@postgres:5432/codelens
      - DATABASE_SYNC_URL=postgresql://codelens:codelens@postgres:5432/codelens
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - repos_temp:/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ---------------------------------------------------------------------------
  # ARQ Background Worker
  # ---------------------------------------------------------------------------
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: codelens-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://codelens:codelens@postgres:5432/codelens
      - DATABASE_SYNC_URL=postgresql://codelens:codelens@postgres:5432/codelens
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend:/app
      - repos_temp:/tmp/repos
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: arq app.workers.worker_config.WorkerSettings

  # ---------------------------------------------------------------------------
  # Next.js Frontend
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    container_name: codelens-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - AUTH_GITHUB_ID=${GITHUB_CLIENT_ID}
      - AUTH_GITHUB_SECRET=${GITHUB_CLIENT_SECRET}
      - AUTH_SECRET=${AUTH_SECRET}
      - AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
      - INTERNAL_API_URL=http://backend:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

# =============================================================================
# Volumes
# =============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  repos_temp:
    driver: local
